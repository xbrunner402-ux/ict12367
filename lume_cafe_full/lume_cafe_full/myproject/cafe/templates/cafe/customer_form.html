{% extends 'cafe/base.html' %}
{% block title %}เพิ่มลูกค้า{% endblock %}{% block n_cust %}active{% endblock %}{% block page_title %}{% if action == "edit" %}แก้ไขข้อมูลลูกค้า{% else %}เพิ่มลูกค้าใหม่{% endif %}{% endblock %}
{% block content %}
<div class="fs" style="max-width:540px"><div class="fs-hdr"><div class="fs-icon">👤</div><span class="fs-title">ข้อมูลลูกค้า</span></div>
<div class="fs-body"><form method="POST">{% csrf_token %}
  <div class="row g-3 mb-3"><div class="col-md-8"><label class="lbl">ชื่อ-นามสกุล *</label><input type="text" name="name" class="inp" value="{% if customer %}{{ customer.name }}{% endif %}" required/></div></div>
  <div class="row g-3 mb-3"><div class="col-md-6"><label class="lbl">เบอร์โทร</label><input type="text" name="phone" class="inp" value="{% if customer %}{{ customer.phone }}{% endif %}"/></div><div class="col-md-6"><label class="lbl">อีเมล</label><input type="email" name="email" class="inp" value="{% if customer %}{{ customer.email }}{% endif %}"/></div></div>
  <div class="mb-4"><label class="lbl">ที่อยู่</label><textarea name="address" class="inp" rows="2"></textarea></div>
  <div style="display:flex;gap:10px"><button type="submit" class="btn-p">บันทึก</button><a href="{% url 'customer_list' %}" class="btn-s" style="text-decoration:none">ยกเลิก</a></div>
</form></div></div>
{% endblock %}
