<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เข้าสู่ระบบ — Lumè Café</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Sarabun',sans-serif;background:#f2ede8;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .login-wrap{display:grid;grid-template-columns:1fr 420px;min-height:100vh;width:100%;}
    .login-left{background:linear-gradient(160deg,#2a1a0e 0%,#1c1410 60%,#3d2314 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden;}
    .login-left::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;border:1px solid rgba(200,135,58,.1);top:50%;left:50%;transform:translate(-50%,-50%);}
    .login-left::after{content:'';position:absolute;width:600px;height:600px;border-radius:50%;border:1px solid rgba(200,135,58,.05);top:50%;left:50%;transform:translate(-50%,-50%);}
    .brand{text-align:center;z-index:1;}
    .brand-icon{font-size:4rem;margin-bottom:20px;display:block;}
    .brand h1{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:800;color:#f5c878;letter-spacing:2px;margin-bottom:8px;}
    .brand p{font-size:13px;color:#7a5c40;letter-spacing:3px;text-transform:uppercase;}
    .brand-tagline{margin-top:32px;font-size:14px;color:#5a3e28;line-height:1.8;text-align:center;max-width:280px;}
    .login-right{background:#faf8f5;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;}
    .login-box{width:100%;max-width:340px;}
    .login-box h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:#3d2314;margin-bottom:6px;}
    .login-box p{font-size:13px;color:#8a7060;margin-bottom:32px;}
    .field{margin-bottom:18px;}
    .field label{display:block;font-size:11px;font-weight:700;color:#8a7060;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    .field input{width:100%;border:1px solid #e0d8cf;border-radius:8px;padding:11px 14px;font-family:'Sarabun',sans-serif;font-size:14px;color:#2c201a;background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;}
    .field input:focus{border-color:#c8873a;box-shadow:0 0 0 3px rgba(200,135,58,.1);}
    .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#c8873a,#a86830);color:#fff;border:none;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;letter-spacing:.3px;}
    .btn-login:hover{background:linear-gradient(135deg,#d49040,#b87830);transform:translateY(-1px);}
    .alert-err{background:#fdf0f0;border:1px solid #f0b0b0;color:#8a2020;padding:11px 14px;border-radius:8px;margin-bottom:18px;font-size:13px;}
    .login-footer{margin-top:32px;font-size:11px;color:#baa890;text-align:center;}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-left">
    <div class="brand">
      <span class="brand-icon"></span>
      <h1>Lumè Café</h1>
      <p>Management System</p>
      <div class="brand-tagline">ระบบจัดการร้านกาแฟ<br></div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-box">
      <h2>เข้าสู่ระบบ</h2>
      <p>กรุณาใส่ชื่อผู้ใช้และรหัสผ่าน</p>
      {% if error %}<div class="alert-err">❌ {{ error }}</div>{% endif %}
      <form method="POST">
        {% csrf_token %}
        <div class="field">
          <label>ชื่อผู้ใช้</label>
          <input type="text" name="username" placeholder="username" autocomplete="username" autofocus/>
        </div>
        <div class="field">
          <label>รหัสผ่าน</label>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn-login">เข้าสู่ระบบ →</button>
      </form>
      <div class="login-footer">Lumè Café  · ระบบจัดการหลังบ้าน</div>
    </div>
  </div>
</div>
</body>
</html>
