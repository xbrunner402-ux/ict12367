<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มแก้ไขข้อมูลประชากร</title> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-banner {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 80px 0;
            margin-bottom: 40px;
        }
        .custom-card {
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .custom-header {
            background-color: #ffc107; /* เปลี่ยนหัวการ์ดเป็นสีเหลืองให้เข้ากับการแก้ไข */
            color: #000;
            padding: 15px;
        }
    </style>
</head>
<body class="bg-light">

    <div class="hero-banner text-center">
        <h2 class="fw-bold">ยินดีต้อนรับสู่เว็บไซต์ของรายวิชา ICT12367</h2>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card custom-card">
                    <div class="card-header custom-header">
                        <h3 class="text-center mb-0">แบบฟอร์มแก้ไขข้อมูลประชากร</h3>
                    </div>
                    <div class="card-body p-4">
                        
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="name" class="form-label">ชื่อประชากร</label>
                                <input type="text" class="form-control" name="name" value="{{ person.name }}" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                            </div>
                            <div class="mb-3">
                                <label for="age" class="form-label">อายุ</label>
                                <input type="number" class="form-control" name="age" value="{{ person.age }}" placeholder="กรอกข้อมูลอายุเป็นตัวเลข" required>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">บันทึกการเปลี่ยนแปลง</button>
                                <a href="/" class="btn btn-danger">ยกเลิก</a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
