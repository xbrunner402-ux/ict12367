<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มบันทึกข้อมูลประชากร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* สร้างแบนเนอร์รูปภาพด้านบน */
        .hero-banner {
            /* ดึงรูปภาพเฟืองมาเป็นพื้นหลัง (ถ้ามีไฟล์รูปของอาจารย์ สามารถเปลี่ยนลิงก์ตรงนี้ได้) */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 80px 0;
            margin-bottom: 50px;
        }
        /* ตกแต่งการ์ดฟอร์มให้มีเงาและหัวสีฟ้า */
        .custom-card {
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .custom-header {
            background-color: #0d6efd; /* สีฟ้าสว่างแบบในรูป */
            color: white;
            padding: 20px;
        }
    </style>
</head>
<body class="bg-light">

    <div class="hero-banner text-center">
        <h1 class="fw-bold">ยินดีต้อนรับสู่เว็บไซต์ของรายวิชา ICT12367</h1>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card custom-card">
                    <div class="card-header custom-header">
                        <h2 class="text-center mb-0">แบบฟอร์มบันทึกข้อมูลประชากร</h2>
                    </div>
                    <div class="card-body p-4">
                        
                        <form method="post" action="/form/">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label for="name" class="form-label">ชื่อประชากร</label>
                                <input type="text" class="form-control" name="name" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                            </div>
                            <div class="mb-4">
                                <label for="age" class="form-label">อายุ</label>
                                <input type="number" class="form-control" name="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข" required>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success px-4 py-2">ลงทะเบียน</button>
                                <button type="reset" class="btn btn-danger px-4 py-2">ล้างข้อมูล</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
